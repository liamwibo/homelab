services:

# VAULTWARDEN
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
     - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
     - WEBSOCKET_ENABLED=true
     - SIGNUPS_ALLOWED=false
     - DOMAIN=${VAULTWARDEN_DOMAIN}
    networks:
      - public
    volumes:
     - ${DATADIR}/vaultwarden:/data:rw
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homeassistant.rule=Host(`${VAULTWARDEN_DOMAIN}`)"
      - "traefik.http.routers.homeassistant.entrypoints=websecure"
      - "traefik.http.routers.homeassistant.tls=true"
      - "traefik.http.routers.homeassistant.tls.certresolver=letencrypt"
      - "traefik.http.services.homeassistant.loadbalancer.server.port=${VAULTWARDENPORT}"

# NETWORKS
networks:
  public:
    external: true
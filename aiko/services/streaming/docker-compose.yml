services:

# JELLYFIN
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=https://${JELLYFIN_DOMAIN}
    networks:
      - public
      - media
    ports:
      - ${JELLYFIN_PORT}:8096
      - 7359:7359/udp
      - 1900:1900/udp
    volumes:
      - ${CONFIGDIR}/jellyfin:/config
      - ${MEDIADIR}/media/tv:/data/tv
      - ${MEDIADIR}/media/movies:/data/movies
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`${JELLYFIN_DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=letencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=${JELLYFIN_PORT}"

# NETWORKS
networks:
  public:
    external: true
  media:
    name: media